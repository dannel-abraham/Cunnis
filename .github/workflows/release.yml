# ──────────────────────────────────────────────────────────────
# Cunnis — Auto-Version, Auto-Tag, Build & Release
# ──────────────────────────────────────────────────────────────
#
# Flujo al hacer push a main:
#   1. Lee version.properties → incrementa PATCH +0.0.1
#   2. Hace commit del version.properties actualizado
#   3. Crea tag automático v{VERSION_NAME} (ej: v0.2.0)
#   4. Build Debug + Release APK (firmadas con release-key.jks del repo)
#   5. Crea GitHub Release con el APK + release notes auto-generados
#
# También corre en PRs a main (solo build, sin tag ni release).
# Se puede disparar manualmente con workflow_dispatch.
# ──────────────────────────────────────────────────────────────

name: Release Cunnis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Evitar que dos releases se pisen entre sí
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write      # para commit, tag y release
  actions: read

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Bump versión, commit, tag
  # ═══════════════════════════════════════════════════════════
  version:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    # Solo en push a main (no en PRs ni manual sin confirmación)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version_code: ${{ steps.bump.outputs.VERSION_CODE }}
      version_name: ${{ steps.bump.outputs.VERSION_NAME }}
      tag: ${{ steps.bump.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          OUTPUT=$(bash scripts/bump-version.sh)
          echo "$OUTPUT"
          # Exportar cada línea como output del step
          echo "VERSION_CODE=$(echo "$OUTPUT" | grep '^VERSION_CODE=' | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$(echo "$OUTPUT" | grep '^VERSION_NAME=' | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"
          echo "TAG=$(echo "$OUTPUT" | grep '^TAG=' | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Verify tag doesn't already exist
        run: |
          TAG="${{ steps.bump.outputs.TAG }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::El tag $TAG ya existe. No se puede crear duplicado."
            exit 1
          fi
          echo "✅ Tag $TAG está disponible"

      - name: Commit version bump
        run: |
          git add version.properties
          VERSION="${{ steps.bump.outputs.VERSION_NAME }}"
          git commit -m "chore: bump version to ${VERSION}"
          git push origin main

      - name: Create and push tag
        run: |
          TAG="${{ steps.bump.outputs.TAG }}"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          echo "✅ Tag $TAG creado y pusheado"

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Build APKs (Debug + Release)
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [version]
    if: always() && needs.version.result == 'success'
    outputs:
      version_name: ${{ needs.version.outputs.version_name }}

    steps:
      - name: Checkout code (with tag for release)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: dannel@alvarez
          KEY_ALIAS: dannel
          KEY_PASSWORD: dannel@alvarez

      - name: Verify APKs were generated
        run: |
          echo "📦 APKs generados:"
          find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Cunnis-Debug-${{ needs.version.outputs.version_name }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Cunnis-Release-${{ needs.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Crear GitHub Release con APK
  # ═══════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.result == 'success' && needs.build.result == 'success'

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: Cunnis-Release-${{ needs.version.outputs.version_name }}
          path: release-apk/

      - name: Rename APK for release
        run: |
          mv release-apk/*.apk "release-apk/Cunnis-${{ needs.version.outputs.version_name }}-Release.apk" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Cunnis ${{ needs.version.outputs.version_name }}"
          files: release-apk/Cunnis-${{ needs.version.outputs.version_name }}-Release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  # JOB PARALELO: PR Check (solo build sin tag/release)
  # ═══════════════════════════════════════════════════════════
  pr-check:
    name: PR Check
    runs-on: ubuntu-latest
    # Solo corre en PRs (no en push a main)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: dannel@alvarez
          KEY_ALIAS: dannel
          KEY_PASSWORD: dannel@alvarez

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Cunnis-Debug-PR
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Cunnis-Release-PR
          path: app/build/outputs/apk/release/*.apk
